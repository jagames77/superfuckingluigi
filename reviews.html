<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: white;
            font-family: Arial, sans-serif;
        }
        
        h1 {
            color: black;
            margin-top: 0;
        }
        
        .nav-buttons {
            margin-bottom: 20px;
        }
        
        button {
            background-color: #c0c0c0;
            color: black;
            border: 2px outset #dfdfdf;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            font-family: Arial, sans-serif;
            margin-right: 5px;
        }
        
        button:active {
            border-style: inset;
        }
        
        .review {
            border: 2px outset #dfdfdf;
            padding: 15px;
            margin: 20px 0;
            background-color: #c0c0c0;
            display: inline-block;
            font-family: MS Sans Serif, Arial;
            font-size: 12px;
        }
        
        .review-rating {
            color: black;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .review-author {
            color: black;
            margin-bottom: 8px;
        }
        
        .review-text {
            color: black;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="nav-buttons">
        <button onclick="window.location.href='index.html'">home</button>
        <button onclick="window.location.href='reviews.html'">reviews</button>
    </div>
    
    <h1>Reviews</h1>
    
    <div class="review">
        <div class="review-author">- Mike T.</div>
        <div class="review-rating">Rating: 10/10</div>
        <div class="review-text">Great product. Very satisfied with my purchase. Would definitely recommend to anyone. Best decision I made.</div>
    </div>
</body>
</html>
