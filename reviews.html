<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reviews</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: white;
            font-family: Arial, sans-serif;
        }
        
        h1 {
            color: black;
            margin-top: 0;
        }
        
        .nav-buttons {
            margin-bottom: 20px;
        }
        
        button {
            background-color: #c0c0c0;
            color: black;
            border: 2px outset #dfdfdf;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 12px;
            font-family: Arial, sans-serif;
            margin-right: 5px;
        }
        
        button:active {
            border-style: inset;
        }
        
        .review {
            border: 2px outset #dfdfdf;
            padding: 15px;
            margin: 20px 0;
            background-color: #c0c0c0;
            display: block;
            font-family: MS Sans Serif, Arial;
            font-size: 12px;
            width: 400px;
        }
        
        .review-author {
            color: black;
            margin-bottom: 8px;
        }
        
        .review-rating {
            color: black;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .review-text {
            color: black;
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>superfuckingluigi</h1>
    <div class="nav-buttons">
        <button onclick="window.location.href='index.html'">home</button>
        <button onclick="window.location.href='reviews.html'">reviews</button>
        <button onclick="window.location.href='deals.html'">deals</button>
    </div>
    
    <h2>Reviews</h2>
    
    <script>
        // 20% chance to show the special review
        if (Math.random() < 0.2) {
            document.body.innerHTML += `
                <div class="review">
                    <div class="review-author">- Mary</div>
                    <div class="review-text">Have you seen my brother? I miss Tobias... Where have you gone, this website is the last thing you were on please come home soon</div>
                </div>
            `;
        } else {
            // Show regular reviews
            document.body.innerHTML += `
                <div class="review">
                    <div class="review-author">- Mike T.</div>
                    <div class="review-rating">Rating: 10/10</div>
                    <div class="review-text">Great product. Very satisfied with my purchase. Would definitely recommend to anyone. Best decision I made.</div>
                </div>
                
                <div class="review">
                    <div class="review-author">- Sarah K.</div>
                    <div class="review-rating">Rating: 10/10</div>
                    <div class="review-text">Amazing! Exceeded all my expectations.</div>
                </div>
                
                <div class="review">
                    <div class="review-author">- John D.</div>
                    <div class="review-rating">Rating: 10/10</div>
                    <div class="review-text">Best purchase I've made in years. Everything is perfect. Quality is outstanding and delivery was fast. Customer service was also incredibly helpful when I had questions. Would buy again in a heartbeat!</div>
                </div>
                
                <div class="review">
                    <div class="review-author">- Emma L.</div>
                    <div class="review-rating">Rating: 10/10</div>
                    <div class="review-text">Love it!</div>
                </div>
                
                <div class="review">
                    <div class="review-author">- David R.</div>
                    <div class="review-rating">Rating: 10/10</div>
                    <div class="review-text">Fantastic experience from start to finish. The product arrived in perfect condition and works exactly as described. Highly impressed with the attention to detail.</div>
                </div>
                
                <div class="review">
                    <div class="review-author">- Lisa M.</div>
                    <div class="review-rating">Rating: 10/10</div>
                    <div class="review-text">Good purchase.</div>
                </div>
                
                <div class="review">
                    <div class="review-author">- Tom W.</div>
                    <div class="review-rating">Rating: 10/10</div>
                    <div class="review-text">Can't believe how good this is. Worth every penny. Changed my life completely. I've already recommended it to all my friends and family. They're all ordering it too!</div>
                </div>
                
                <div class="review">
                    <div class="review-author">- Rachel B.</div>
                    <div class="review-rating">Rating: 10/10</div>
                    <div class="review-text">10 out of 10.</div>
                </div>
            `;
        }
    </script>

</body>
</html>
