<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>superfuckingluigi</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: white;
            overflow-x: hidden;
            height: 100vh;
        }
        
        h1 {
            color: black;
            margin: 0;
            padding: 20px;
        }
        
        .slide-container {
            overflow: hidden;
            position: fixed;
            bottom: 50%;
            left: 0;
            width: 100%;
            height: 600px;
        }
        
        .sliding-image {
            height: 100%;
            animation: slide 20s linear infinite;
            display: inline-block;
        }
        
        .sliding-image img {
            height: 100%;
            object-fit: contain;
        }
        
        @keyframes slide {
            0% {
                transform: translateX(100vw);
            }
            100% {
                transform: translateX(-800px);
            }
        }
    </style>
</head>
<body>
    <h1>superfuckingluigi</h1>
    <div class="slide-container">
        <div class="sliding-image">
            <img src="image_2026-06-03_005607934.png" alt="Luigi">
        </div>
    </div>
</body>
</html>
