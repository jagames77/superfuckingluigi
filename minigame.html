<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catch The Objects</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        h1 {
            color: #cccccc;
            margin: 0 0 20px 0;
        }
        
        #gameContainer {
            position: relative;
            width: 600px;
            height: 800px;
            background-color: #0d0d0d;
            border: 3px solid #333333;
            overflow: hidden;
        }
        
        #player {
            position: absolute;
            bottom: 10px;
            left: 275px;
            width: 50px;
            height: 60px;
            background-color: #333333;
            border: 2px solid #666666;
            transition: none;
        }
        
        .falling-object {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: #444444;
            border: 2px solid #666666;
        }
        
        #score {
            font-size: 24px;
            margin-top: 20px;
            color: #cccccc;
        }
        
        #gameOver {
            font-size: 28px;
            color: #ff4444;
            margin-top: 20px;
            display: none;
        }
        
        #interactPrompt {
            position: absolute;
            font-size: 14px;
            color: #ffff00;
            display: none;
            pointer-events: none;
        }
        
        #redButton {
            position: absolute;
            width: 40px;
            height: 60px;
            background-color: #ff0000;
            border: 2px solid #990000;
            display: none;
        }
        
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #333333;
            color: #cccccc;
            border: 2px solid #666666;
        }
        
        button:hover {
            background-color: #444444;
        }
    </style>
</head>
<body>
    <h1>Catch The Falling Objects...</h1>
    <div id="gameContainer">
        <div id="player"></div>
        <div id="redButton"></div>
        <div id="interactPrompt">Press SPACE to interact</div>
    </div>
    <div id="score">Score: 0</div>
    <div id="gameOver">GAME OVER</div>
    <button onclick="window.location.href='reviews.html'">Back to Reviews</button>

    <script>
        const gameContainer = document.getElementById('gameContainer');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const gameOverDisplay = document.getElementById('gameOver');
        const redButton = document.getElementById('redButton');
        const interactPrompt = document.getElementById('interactPrompt');
        
        let score = 0;
        let playerX = 275;
        let playerY = 740;
        let gameOver = false;
        let inEndingSequence = false;
        let canInteract = false;
        let interacted = false;
        
        const playerWidth = 50;
        const playerHeight = 60;
        const containerWidth = 600;
        const containerHeight = 800;
        
        // Smooth player movement
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (e.key === ' ' && canInteract && !interacted) {
                e.preventDefault();
                playSound();
                interacted = true;
                interactPrompt.style.display = 'none';
            }
        });
        document.addEventListener('keyup', (e) => {
            keys[e.key] = false;
        });
        
        // Smooth movement loop
        setInterval(() => {
            if (!gameOver && !inEndingSequence) {
                if (keys['ArrowLeft'] && playerX > 0) {
                    playerX -= 8;
                }
                if (keys['ArrowRight'] && playerX < containerWidth - playerWidth) {
                    playerX += 8;
                }
                player.style.left = playerX + 'px';
                player.style.bottom = playerY + 'px';
            } else if (inEndingSequence) {
                // Move right during ending sequence
                if (keys['ArrowRight'] && playerX < containerWidth + 200) {
                    playerX += 8;
                    player.style.left = playerX + 'px';
                }
                
                // Check if off screen right
                if (playerX > containerWidth) {
                    transitionToButtonScene();
                }
                
                // Check distance to button for interaction
                const buttonCenterX = redButton.offsetLeft + 20;
                const buttonCenterY = containerHeight - 110;
                const playerCenterX = playerX + playerWidth / 2;
                const playerCenterY = playerY + playerHeight / 2;
                
                const distance = Math.sqrt(
                    Math.pow(playerCenterX - buttonCenterX, 2) + 
                    Math.pow(playerCenterY - buttonCenterY, 2)
                );
                
                if (distance < 60) {
                    canInteract = true;
                    interactPrompt.style.display = 'block';
                    interactPrompt.style.left = (buttonCenterX - 40) + 'px';
                    interactPrompt.style.top = (buttonCenterY - 40) + 'px';
                } else {
                    canInteract = false;
                    interactPrompt.style.display = 'none';
                }
            }
        }, 30);
        
        // Spawn falling objects
        function spawnObject() {
            if (gameOver || inEndingSequence) return;
            
            const fallingObject = document.createElement('div');
            fallingObject.className = 'falling-object';
            const randomX = Math.random() * (containerWidth - 30);
            fallingObject.style.left = randomX + 'px';
            fallingObject.style.top = '0px';
            gameContainer.appendChild(fallingObject);
            
            let top = 0;
            const speed = 4;
            
            const fallInterval = setInterval(() => {
                top += speed;
                fallingObject.style.top = top + 'px';
                
                // Check collision with player
                if (
                    top + 30 > containerHeight - playerHeight &&
                    randomX < playerX + playerWidth &&
                    randomX + 30 > playerX
                ) {
                    score++;
                    scoreDisplay.textContent = 'Score: ' + score;
                    fallingObject.remove();
                    clearInterval(fallInterval);
                }
                
                // Game over if object touches ground
                if (top >= containerHeight) {
                    gameOver = true;
                    inEndingSequence = true;
                    gameOverDisplay.style.display = 'block';
                    fallingObject.remove();
                    clearInterval(fallInterval);
                }
            }, 30);
        }
        
        function transitionToButtonScene() {
            // Pan camera and show button
            player.style.left = '-50px';
            redButton.style.display = 'block';
            redButton.style.left = '400px';
            redButton.style.bottom = '100px';
            gameContainer.style.backgroundColor = '#0a0a0a';
        }
        
        function playSound() {
            // Create oscillator for a beep sound
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.5);
        }
        
        // Spawn objects every 1200ms
        setInterval(spawnObject, 1200);
    </script>
</body>
</html>
